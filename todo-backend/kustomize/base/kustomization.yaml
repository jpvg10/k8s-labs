apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
helmCharts:
  - name: nats
    repo: https://nats-io.github.io/k8s/helm/charts/
    version: 2.12.4
    releaseName: my-nats
    namespace: project
    valuesInline:
      config:
        cluster:
          enabled: true
        jetstream:
          enabled: true
images:
  - name: PROJECT/IMAGE
    newName: jpvalencia/todo-backend:b9bd4215b2f6
