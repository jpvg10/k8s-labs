apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: project
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgresapp
  ports:
    - port: 5432
      name: db
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-configmap
  namespace: project
data:
  initdb.sql: |
    CREATE TABLE todos (id SERIAL, description TEXT);
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stset
  namespace: project
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgresapp
  template:
    metadata:
      labels:
        app: postgresapp
    spec:
      volumes:
        - name: postgres-initdb
          configMap:
            name: postgres-configmap
      containers:
        - name: postgres
          image: postgres:18.0
          env:
            # TODO: store password in a Secret
            - name: POSTGRES_PASSWORD
              value: example
          volumeMounts:
            - name: postgres-data-storage
              mountPath: /var/lib/postgresql
            - name: postgres-initdb
              mountPath: /docker-entrypoint-initdb.d
  volumeClaimTemplates:
    - metadata:
        name: postgres-data-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 100Mi
