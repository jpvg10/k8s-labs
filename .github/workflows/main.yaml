name: Build, push to ACR, and deploy to AKS
# Using OIDC for authentication

on:
  push:
    branches:
      - main
    paths:
      - 'todo-app/**'
      - 'todo-backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

env:
  # RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  # CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  REGISTRY_LOGIN_SERVER: ${{ secrets.REGISTRY_LOGIN_SERVER }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: todo-app
            # dockerfile: todo-app/Dockerfile
            path: todo-app
          - name: todo-backend
            # dockerfile: todo-backend/Dockerfile
            path: todo-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # - name: Set Git Commit SHA
      #   run: |
      #     echo "GIT_COMMIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Docker build and push ACR
        run: |
          az acr login --name ${{ env.REGISTRY_LOGIN_SERVER }}
          docker build -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }} ${{ matrix.app.path }}
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}

      # - name: Build and push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./${{ matrix.app.path }}
      #     file: ${{ matrix.app.dockerfile }}
      #     push: true
      #     tags: |
      #       ${{ env.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}
      #       ${{ env.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:latest

      - name: Log image push details
        run: |
          echo "Image pushed: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}"

