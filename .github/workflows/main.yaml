name: Build, push to ACR, and deploy to AKS
# Using OIDC for authentication

on:
  push:
    branches:
      - main
    paths:
      - 'todo-app/**'
      - 'todo-backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

env:
  RESOURCE_GROUP: k8s-labs
  CLUSTER_NAME: k8s-labs-cluster

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: todo-app
            path: todo-app
          - name: todo-backend
            path: todo-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Docker build and push to ACR
        run: |
          az acr login --name ${{ secrets.REGISTRY_LOGIN_SERVER }}
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }} ${{ matrix.app.path }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}

      - name: Log image push details
        run: |
          echo "Image pushed: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}"

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: todo-app
            path: todo-app
          - name: todo-backend
            path: todo-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Update image in kustomization
        working-directory: ./${{ matrix.app.path }}
        run: |
          IMAGE=${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}
          sed -E -i "s|(^[[:space:]]*newName:[[:space:]]*).*|\1${IMAGE}|" kustomization.yaml

      - uses: azure/k8s-bake@v3
        id: bake
        with:
          renderEngine: kustomize
          kustomizationPath: ${{ matrix.app.path }}
          kubectl-version: latest

      - uses: azure/k8s-deploy@v4
        with:
          manifests: ${{ steps.bake.outputs.manifestsBundle }}
          namespace: project
