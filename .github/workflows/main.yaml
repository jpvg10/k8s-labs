name: Build, push to ACR, and update repo with new images
# Using OIDC for authentication

on:
  push:
    paths:
      - 'broadcaster/**'
      - 'todo-app/**'
      - 'todo-backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC authentication
  contents: write

env:
  RESOURCE_GROUP: k8s-labs
  CLUSTER_NAME: k8s-labs-cluster

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: broadcaster
            path: broadcaster
          - name: todo-app
            path: todo-app
          - name: todo-backend
            path: todo-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Docker build and push to ACR
        run: |
          az acr login --name ${{ vars.REGISTRY_LOGIN_SERVER }}
          docker build -t ${{ vars.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }} ${{ matrix.app.path }}
          docker push ${{ vars.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}

      - name: Log image push details
        run: |
          echo "Image pushed: ${{ vars.REGISTRY_LOGIN_SERVER }}/${{ matrix.app.name }}:${{ github.sha }}"

  update-kustomization:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update images in kustomization files
        run: |
          for app in broadcaster todo-app todo-backend; do
            (
              IMAGE=${{ vars.REGISTRY_LOGIN_SERVER }}/${app}:${{ github.sha }}
              cd $app/kustomize/overlays/azure/prod
              kustomize edit set image PROJECT/IMAGE=${IMAGE}
              cd ../staging
              kustomize edit set image PROJECT/IMAGE=${IMAGE}
            )
          done

      - name: Commit the images to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "set new image tags"
          git push
