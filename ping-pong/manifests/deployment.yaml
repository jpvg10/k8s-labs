apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
        - name: ping-pong
          image: jpvalencia/ping-pong:e9aac7fbb840
          env:
            - name: PORT
              value: "4000"
            - name: DB_HOST
              value: "postgres-svc"
            # TODO: store password in a Secret
            - name: DB_PASSWORD
              value: example
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 5
            httpGet:
               path: /ready
               port: 4000
