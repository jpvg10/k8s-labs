apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-folder
          persistentVolumeClaim:
            claimName: log-output-pv-claim
      containers:
        - name: log-webapp
          image: jpvalencia/log-webapp:7da9ef9d1642
          volumeMounts:
            - name: shared-folder
              mountPath: /usr/src/app/files
          env:
            - name: PORT
              value: "3000"
            - name: PING_PONG_SVC_URL
              value: "http://ping-pong-svc:3456"
        - name: string-generator
          image: jpvalencia/string-generator:3cd81820d22e
          volumeMounts:
            - name: shared-folder
              mountPath: /usr/src/app/files
